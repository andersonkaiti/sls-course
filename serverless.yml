org: andersonkaiti
service: api-serverless

provider:
  name: aws
  runtime: nodejs24.x

functions:
  hello:
    handler: src/functions/hello.handler
    events:
      - httpApi:
          path: /
          method: GET
  getUserById:
    handler: src/functions/get-user-by-id.handler
    events:
      - httpApi:
          path: /users/{userId}
          method: GET
